version: 2

project_name: gdedit

builds:
  - id: gdedit
    main: ./cmd/gdedit
    binary: gdedit
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X gdedit/internal/version.buildVersion={{ .Version }}

archives:
  - id: gdedit
    ids:
      - gdedit
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive
    cmd: syft
    args:
      - "$artifact"
      - --output
      - spdx-json=$document

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
